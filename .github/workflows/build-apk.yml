name: Build and Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Sync Capacitor assets to Android project
        run: npx cap sync android

      - name: Set build version variables
        id: version
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          BUILD_NUMBER=${{ github.run_number }}
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${APP_VERSION}-build${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "apk_name=4Learners-v${APP_VERSION}-build${BUILD_NUMBER}.apk" >> "$GITHUB_OUTPUT"

      - name: Update versionCode in build.gradle
        run: |
          sed -i "s/versionCode[[:space:]]*[0-9][0-9]*/versionCode ${{ steps.version.outputs.build_number }}/" android/app/build.gradle

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd android && ./gradlew assembleRelease

      - name: Rename APK with version and build number
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "4Learners ${{ steps.version.outputs.tag }}"
          body: |
            Automated release built from commit ${{ github.sha }} on merge to `main`.

            **Build:** ${{ steps.version.outputs.build_number }}
            **Version:** ${{ steps.version.outputs.app_version }}
          files: android/app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}

      - name: Remove keystore file
        if: always()
        run: rm -f android/app/keystore.jks
